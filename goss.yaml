file:
  /bin/deno:
    exists: true
    filetype: file
    contains: []
  /usr/share/tessdata/eng.traineddata:
    exists: true
package:
  tesseract-ocr:
    installed: true
command:
  tesseract --list-langs:
    exit-status: 0
    stdout:
      - eng
      - deu
      - fra
      - kat
      - pol
      - rus
      - spa
http:
  http://127.0.0.1:8884/status:
    status: 200
    allow-insecure: false
    no-follow-redirects: false
    timeout: 5000
    body:
      - "version"
      - "commit"
  http://127.0.0.1:8884/:
    status: 200
    timeout: 5000
    body:
      - "monaco-editor"
  http://127.0.0.1:8884/vendor/monaco-editor/min/vs/loader.js:
    status: 200
    timeout: 5000
  http://127.0.0.1:8884/vendor/monaco-editor/min/vs/editor/editor.main.js:
    status: 200
    timeout: 5000
