name: CICD

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - master
  push:
    tags: "v*"
    paths:
      - "src/**/*"
      - "test/**/*"
      - ".github/workflows/**/*"
      - "deno.json"
      - "deno.lock"
      - "Dockerfile"
      - ".dockerignore"
      - "goss*.yaml"

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check src/index.ts
      - run: deno lint
      - run: deno fmt --check
      - run: deno test --allow-all --coverage=coverage
      - run: deno coverage coverage --lcov --output=coverage.lcov
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-22.04
          - platform: linux/arm64/v8
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute staging tags
        id: staging
        env:
          PLATFORM: ${{ matrix.platform }}
          SHA: ${{ github.sha }}
        run: |
          ESCAPED="${PLATFORM//[^0-9a-zA-Z._-]/-}"
          BUILD_TAG="git-${SHA}-${ESCAPED}"
          echo "ghcr=ghcr.io/hertzg/tesseract-server:${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=hertzg/tesseract-server:${BUILD_TAG}" >> "$GITHUB_OUTPUT"
      - name: Write build metadata
        run: echo '{"commit":"${{ github.sha }}"}' > build.json
      - name: Build image
        run: docker build -t tesseract-server:test .
      - uses: e1himself/goss-installation-action@v1.3.0
        with:
          version: v0.4.9
      - name: Test image
        run: dgoss run tesseract-server:test
      - name: Generate OCI labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hertzg/tesseract-server
      - name: Push to registries
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          cache-from: type=gha,scope=buildx-${{ matrix.platform }}
          cache-to: type=gha,scope=buildx-${{ matrix.platform }},mode=max
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            ${{ steps.staging.outputs.ghcr }}
            ${{ steps.staging.outputs.dockerhub }}

  docker-publish:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs:
      - lint-and-test
      - docker-build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      pull-requests: write
    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/hertzg/tesseract-server
            hertzg/tesseract-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
      - name: Create and push multiarch manifests
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          SHA: ${{ github.sha }}
        run: |
          PLATFORMS=("linux-amd64" "linux-arm64-v8")

          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            REPO="${TAG%%:*}"
            SOURCES=""
            for P in "${PLATFORMS[@]}"; do
              SOURCES="$SOURCES ${REPO}:git-${SHA}-${P}"
            done

            echo "Creating manifest: $TAG"
            # shellcheck disable=SC2086
            docker buildx imagetools create -t "$TAG" $SOURCES
            echo "Pushed manifest: $TAG"
          done <<< "$TAGS"
      - name: Create PR comment (first build only)
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          only_create: true
          message: |
            ### 🐳 Docker
            ```
            docker run --rm --pull always -p 8884:8884 ghcr.io/hertzg/tesseract-server:pr-${{ github.event.pull_request.number }}
            ```
      - name: Append build result
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          append: true
          message: |
            ✅ [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) published at ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
