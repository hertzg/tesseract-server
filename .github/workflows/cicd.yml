name: CICD

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - master
  push:
    tags: "v*"
    paths:
      - "src/**/*"
      - "test/**/*"
      - ".github/workflows/**/*"
      - "deno.json"
      - "deno.lock"
      - "Dockerfile"
      - ".dockerignore"
      - "goss*.yaml"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check src/index.ts
      - run: deno lint
      - run: deno fmt --check

  report-lint:
    if: ${{ github.event_name == 'pull_request' }}
    needs: lint
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cicd-report
          message: |
            ## CICD Report
            | Timestamp | Stage | Result |
            |-----------|-------|--------|
            | `${{ steps.ts.outputs.timestamp }}` | lint | ${{ needs.lint.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.lint.result }} |

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --allow-all

  report-test:
    if: ${{ github.event_name == 'pull_request' }}
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cicd-report
          append: true
          message: |
            | `${{ steps.ts.outputs.timestamp }}` | test | ${{ needs.test.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.test.result }} |

  compile:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            target: x86_64-unknown-linux-gnu
          - platform: linux/arm64/v8
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno compile --no-check --allow-net --allow-read --allow-write --allow-run --allow-env --allow-sys --target ${{ matrix.target }} --output tesseract-server src/index.ts
      - uses: actions/upload-artifact@v6
        with:
          name: tesseract-server-${{ matrix.target }}
          path: tesseract-server

  report-compile:
    if: ${{ github.event_name == 'pull_request' }}
    needs: compile
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cicd-report
          append: true
          message: |
            | `${{ steps.ts.outputs.timestamp }}` | compile | ${{ needs.compile.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.compile.result }} |

  docker:
    runs-on: ubuntu-24.04
    outputs:
      builds: ${{ steps.generate.outputs.builds }}
      tags: ${{ steps.generate.outputs.tags }}
    steps:
      - id: generate
        run: |
          REPOS='["ghcr.io/hertzg/tesseract-server","hertzg/tesseract-server"]'
          PLATFORMS='[{"platform":"linux/amd64","target":"x86_64-unknown-linux-gnu","runner":"ubuntu-22.04"},{"platform":"linux/arm64/v8","target":"aarch64-unknown-linux-gnu","runner":"ubuntu-22.04-arm"}]'
          SHA="${{ github.sha }}"

          BUILDS=$(echo "$PLATFORMS" | jq -c --arg sha "$SHA" '{include: [.[] | {platform, target, runner, tag: ("tesseract-server:git-" + $sha + "-" + (.platform | gsub("[^0-9a-zA-Z._-]"; "-")))}]}')
          echo "builds=$BUILDS" >> "$GITHUB_OUTPUT"

          # Generate tags for multiarch manifests
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"

          TAGS="[]"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/}"
            TAGS=$(echo "$REPOS" | jq -c --arg v "$VERSION" '[.[] | . + ":" + $v, . + ":latest"]')
          elif [[ "$REF" == "refs/heads/master" ]]; then
            TAGS=$(echo "$REPOS" | jq -c '[.[] | . + ":master"]')
          elif [[ "$REF" == refs/heads/* ]]; then
            BRANCH="${REF#refs/heads/}"
            SAFE_BRANCH="${BRANCH//[^a-zA-Z0-9._-]/_}"
            TAGS=$(echo "$REPOS" | jq -c --arg b "branch-$SAFE_BRANCH" '[.[] | . + ":" + $b]')
          elif [[ "$EVENT" == "pull_request" ]]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            TAGS=$(echo "$REPOS" | jq -c --arg pr "pr-$PR_NUM" '[.[] | . + ":" + $pr]')
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

  report-docker:
    if: ${{ github.event_name == 'pull_request' }}
    needs: docker
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: fmt
        env:
          TAGS_JSON: ${{ needs.docker.outputs.tags }}
        run: |
          TAG_LIST=$(echo "$TAGS_JSON" | jq -r '.[]' | sed 's/^/- `/' | sed 's/$/`/')
          {
            echo "tags<<EOF"
            echo "$TAG_LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cicd-report
          append: true
          message: |
            | `${{ steps.ts.outputs.timestamp }}` | docker | :white_check_mark: tags resolved |

            ${{ steps.fmt.outputs.tags }}

  docker-build:
    needs:
      - docker
      - compile
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-v2-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-v2-${{ matrix.platform }}
            ${{ runner.os }}-buildx-v2-
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: tesseract-server-${{ matrix.target }}
          path: ./compiled/
      - run: chmod +x ./compiled/tesseract-server
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: ${{ matrix.platform }}
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          tags: ${{ matrix.tag }}
          build-contexts: |
            builder=./compiled/
      - uses: ishworkh/container-image-artifact-upload@v2.0.0
        with:
          image: ${{ matrix.tag }}

  report-docker-build:
    if: ${{ github.event_name == 'pull_request' && always() }}
    needs: docker-build
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cicd-report
          append: true
          message: |
            | `${{ steps.ts.outputs.timestamp }}` | docker-build | ${{ needs.docker-build.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.docker-build.result }} |

  docker-test:
    needs:
      - docker
      - docker-build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: ishworkh/container-image-artifact-download@v2.1.0
        with:
          image: ${{ matrix.tag }}
      - uses: e1himself/goss-installation-action@v1.3.0
        with:
          version: v0.4.9
      - uses: actions/checkout@v6
      - run: dgoss run ${{ matrix.tag }}

  report-docker-test:
    if: ${{ github.event_name == 'pull_request' && always() }}
    needs: docker-test
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cicd-report
          append: true
          message: |
            | `${{ steps.ts.outputs.timestamp }}` | docker-test | ${{ needs.docker-test.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.docker-test.result }} |

  docker-dive:
    needs:
      - docker
      - docker-build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: ishworkh/container-image-artifact-download@v2.1.0
        with:
          image: ${{ matrix.tag }}
      - name: Analyze image with dive
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            wagoodman/dive:v0.13 ${{ matrix.tag }} --ci

  report-docker-dive:
    if: ${{ github.event_name == 'pull_request' && always() }}
    needs: docker-dive
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cicd-report
          append: true
          message: |
            | `${{ steps.ts.outputs.timestamp }}` | docker-dive | ${{ needs.docker-dive.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.docker-dive.result }} |

  docker-push:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'hertzg/tesseract-server' }}
    needs:
      - test
      - docker
      - docker-test
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: ishworkh/container-image-artifact-download@v2.1.0
        with:
          image: ${{ matrix.tag }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image tags
        env:
          LOCAL_TAG: ${{ matrix.tag }}
          TAGS_JSON: ${{ needs.docker.outputs.tags }}
          PLATFORM: ${{ matrix.platform }}
          SHA: ${{ github.sha }}
        run: |
          # Push the per-platform build tag to each registry
          ESCAPED_PLATFORM="${PLATFORM//[^0-9a-zA-Z._-]/-}"
          BUILD_TAG="git-${SHA}-${ESCAPED_PLATFORM}"
          for REPO in $(echo '["ghcr.io/hertzg/tesseract-server","hertzg/tesseract-server"]' | jq -r '.[]'); do
            PUSH_NAME="${REPO}:${BUILD_TAG}"
            docker tag "$LOCAL_TAG" "$PUSH_NAME"
            docker push "$PUSH_NAME"
          done

  report-docker-push:
    if: ${{ github.event_name == 'pull_request' && always() }}
    needs: docker-push
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cicd-report
          append: true
          message: |
            | `${{ steps.ts.outputs.timestamp }}` | docker-push | ${{ needs.docker-push.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.docker-push.result }} |

  docker-multiarch:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'hertzg/tesseract-server' }}
    needs:
      - docker
      - docker-push
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multiarch manifests
        env:
          TAGS_JSON: ${{ needs.docker.outputs.tags }}
          BUILDS_JSON: ${{ needs.docker.outputs.builds }}
          SHA: ${{ github.sha }}
        run: |
          # Collect per-platform image refs for manifest
          IMAGES=""
          for PLATFORM in $(echo "$BUILDS_JSON" | jq -r '.include[].platform'); do
            ESCAPED="${PLATFORM//[^0-9a-zA-Z._-]/-}"
            # We use the first repo as the source for manifest images
            IMAGES="$IMAGES ghcr.io/hertzg/tesseract-server:git-${SHA}-${ESCAPED}"
          done

          # Create a manifest for each tag
          for TAG in $(echo "$TAGS_JSON" | jq -r '.[]'); do
            echo "Creating manifest: $TAG"
            # shellcheck disable=SC2086
            docker manifest create "$TAG" $IMAGES
            docker manifest push "$TAG"
            echo "Pushed manifest: $TAG"
          done

  report-docker-multiarch:
    if: ${{ github.event_name == 'pull_request' && always() }}
    needs: docker-multiarch
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cicd-report
          append: true
          message: |
            | `${{ steps.ts.outputs.timestamp }}` | docker-multiarch | ${{ needs.docker-multiarch.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.docker-multiarch.result }} |
