name: CICD

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - master
  push:
    tags: "v*"
    paths:
      - "src/**/*"
      - "test/**/*"
      - ".github/workflows/**/*"
      - "deno.json"
      - "deno.lock"
      - "Dockerfile"
      - ".dockerignore"
      - "goss*.yaml"

jobs:
  lint:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check src/index.ts
      - run: deno lint
      - run: deno fmt --check
      - if: ${{ github.event_name == 'pull_request' && always() }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          message: |
            ## CICD Report
            | Stage | Result |
            |-------|--------|
            | lint | ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} ${{ job.status }} |

  test:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --allow-all
      - if: ${{ github.event_name == 'pull_request' && always() }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          append: true
          message: |
            | test | ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} ${{ job.status }} |

  compile:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            target: x86_64-unknown-linux-gnu
          - platform: linux/arm64/v8
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download Monaco Editor
        run: |
          curl -sL https://registry.npmjs.org/monaco-editor/-/monaco-editor-0.49.0.tgz \
            | tar -xz --strip-components=1 package/min
          mkdir -p vendor/monaco-editor
          mv min vendor/monaco-editor/
      - run: deno compile --include vendor --no-check --allow-net --allow-read --allow-write --allow-run --allow-env --allow-sys --target ${{ matrix.target }} --output tesseract-server src/index.ts
      - uses: actions/upload-artifact@v7
        with:
          name: tesseract-server-${{ matrix.target }}
          path: tesseract-server
      - if: ${{ github.event_name == 'pull_request' && always() }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          append: true
          message: |
            | compile | ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} [tesseract-server-${{ matrix.target }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

  docker:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    outputs:
      builds: ${{ steps.generate.outputs.builds }}
      tags: ${{ steps.generate.outputs.tags }}
    steps:
      - id: generate
        run: |
          REPOS='["ghcr.io/hertzg/tesseract-server","hertzg/tesseract-server"]'
          PLATFORMS='[{"platform":"linux/amd64","target":"x86_64-unknown-linux-gnu","runner":"ubuntu-22.04"},{"platform":"linux/arm64/v8","target":"aarch64-unknown-linux-gnu","runner":"ubuntu-22.04-arm"}]'
          SHA="${{ github.sha }}"

          BUILDS=$(echo "$PLATFORMS" | jq -c --arg sha "$SHA" '{include: [.[] | {platform, target, runner, tag: ("tesseract-server:git-" + $sha + "-" + (.platform | gsub("[^0-9a-zA-Z._-]"; "-")))}]}')
          echo "builds=$BUILDS" >> "$GITHUB_OUTPUT"

          # Generate tags for multiarch manifests
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"

          TAGS="[]"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/}"
            TAGS=$(echo "$REPOS" | jq -c --arg v "$VERSION" '[.[] | . + ":" + $v, . + ":latest"]')
          elif [[ "$REF" == "refs/heads/master" ]]; then
            TAGS=$(echo "$REPOS" | jq -c '[.[] | . + ":master"]')
          elif [[ "$REF" == refs/heads/* ]]; then
            BRANCH="${REF#refs/heads/}"
            SAFE_BRANCH="${BRANCH//[^a-zA-Z0-9._-]/_}"
            TAGS=$(echo "$REPOS" | jq -c --arg b "branch-$SAFE_BRANCH" '[.[] | . + ":" + $b]')
          elif [[ "$EVENT" == "pull_request" ]]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            TAGS=$(echo "$REPOS" | jq -c --arg pr "pr-$PR_NUM" '[.[] | . + ":" + $pr]')
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - if: ${{ github.event_name == 'pull_request' }}
        id: fmt
        env:
          TAGS_JSON: ${{ steps.generate.outputs.tags }}
        run: |
          TAG_LIST=$(echo "$TAGS_JSON" | jq -r '.[]' | sed 's/^/- `/' | sed 's/$/`/')
          {
            echo "tags<<EOF"
            echo "$TAG_LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          append: true
          message: |
            | docker | :white_check_mark: tags resolved |

            ${{ steps.fmt.outputs.tags }}

  docker-build-push:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'hertzg/tesseract-server' }}
    needs:
      - docker
      - compile
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      pull-requests: write
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: tesseract-server-${{ matrix.target }}
          path: ./compiled/
      - run: chmod +x ./compiled/tesseract-server
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute staging tags
        id: staging
        env:
          PLATFORM: ${{ matrix.platform }}
          SHA: ${{ github.sha }}
        run: |
          ESCAPED="${PLATFORM//[^0-9a-zA-Z._-]/-}"
          BUILD_TAG="git-${SHA}-${ESCAPED}"
          echo "ghcr=ghcr.io/hertzg/tesseract-server:${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=hertzg/tesseract-server:${BUILD_TAG}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          cache-from: type=gha,scope=buildx-${{ matrix.platform }}
          cache-to: type=gha,scope=buildx-${{ matrix.platform }},mode=max
          tags: |
            ${{ steps.staging.outputs.ghcr }}
            ${{ steps.staging.outputs.dockerhub }}
          build-contexts: |
            builder=./compiled/
      - if: ${{ github.event_name == 'pull_request' && always() }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          append: true
          message: |
            | build+push | ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} `${{ matrix.tag }}` |

  docker-test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'hertzg/tesseract-server' }}
    needs:
      - docker
      - docker-build-push
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: read
      pull-requests: write
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull staging image
        env:
          PLATFORM: ${{ matrix.platform }}
          SHA: ${{ github.sha }}
        run: |
          ESCAPED="${PLATFORM//[^0-9a-zA-Z._-]/-}"
          BUILD_TAG="git-${SHA}-${ESCAPED}"
          docker pull "ghcr.io/hertzg/tesseract-server:${BUILD_TAG}"
          docker tag "ghcr.io/hertzg/tesseract-server:${BUILD_TAG}" "${{ matrix.tag }}"
      - uses: e1himself/goss-installation-action@v1.3.0
        with:
          version: v0.4.9
      - uses: actions/checkout@v6
      - run: dgoss run ${{ matrix.tag }}
      - if: ${{ github.event_name == 'pull_request' && always() }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          append: true
          message: |
            | test | ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} `${{ matrix.tag }}` |

  docker-dive:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'hertzg/tesseract-server' }}
    needs:
      - docker
      - docker-build-push
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: read
      pull-requests: write
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull staging image
        env:
          PLATFORM: ${{ matrix.platform }}
          SHA: ${{ github.sha }}
        run: |
          ESCAPED="${PLATFORM//[^0-9a-zA-Z._-]/-}"
          BUILD_TAG="git-${SHA}-${ESCAPED}"
          docker pull "ghcr.io/hertzg/tesseract-server:${BUILD_TAG}"
          docker tag "ghcr.io/hertzg/tesseract-server:${BUILD_TAG}" "${{ matrix.tag }}"
      - name: Analyze image with dive
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            wagoodman/dive:v0.13 ${{ matrix.tag }} --ci
      - if: ${{ github.event_name == 'pull_request' && always() }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          append: true
          message: |
            | dive | ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} `${{ matrix.tag }}` |

  docker-multiarch:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'hertzg/tesseract-server' }}
    needs:
      - test
      - docker
      - docker-test
      - docker-build-push
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      packages: write
    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multiarch manifests
        id: manifests
        env:
          TAGS_JSON: ${{ needs.docker.outputs.tags }}
          BUILDS_JSON: ${{ needs.docker.outputs.builds }}
          SHA: ${{ github.sha }}
        run: |
          PLATFORMS=$(echo "$BUILDS_JSON" | jq -r '.include[].platform')

          PUSHED=""
          for TAG in $(echo "$TAGS_JSON" | jq -r '.[]'); do
            # Extract repo (everything before the colon) to match source registry
            REPO="${TAG%%:*}"

            SOURCES=""
            for PLATFORM in $PLATFORMS; do
              ESCAPED="${PLATFORM//[^0-9a-zA-Z._-]/-}"
              SOURCES="$SOURCES ${REPO}:git-${SHA}-${ESCAPED}"
            done

            echo "Creating manifest: $TAG"
            # shellcheck disable=SC2086
            docker buildx imagetools create -t "$TAG" $SOURCES
            echo "Pushed manifest: $TAG"
            PUSHED="${PUSHED}- \`${TAG}\`\n"
          done

          {
            echo "pushed<<EOF"
            echo -e "$PUSHED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - if: ${{ github.event_name == 'pull_request' && always() }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cicd-report
          append: true
          message: |
            | multiarch | ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} |

            ${{ steps.manifests.outputs.pushed }}
