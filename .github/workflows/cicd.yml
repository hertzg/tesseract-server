name: CICD
on:
  pull_request:
    branches:
      - master
  push:
    tags: "v*"
    paths:
      - "src/**/*"
      - "test/**/*"
      - ".github/workflows/**/*"
      - "deno.json"
      - "deno.lock"
      - "Dockerfile"
      - ".dockerignore"
      - "goss*.yaml"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check src/index.ts
      - run: deno lint
      - run: deno fmt --check

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --allow-all

  compile:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            target: x86_64-unknown-linux-gnu
          - platform: linux/arm64/v8
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno compile --no-check --allow-net --allow-read --allow-write --allow-run --allow-env --allow-sys --target ${{ matrix.target }} --output tesseract-server src/index.ts
      - uses: actions/upload-artifact@v6
        with:
          name: tesseract-server-${{ matrix.target }}
          path: tesseract-server

  docker:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    outputs:
      builds: ${{ steps.matrix.outputs.builds }}
      pr-number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || steps.find-pr.outputs.pr }}
    steps:
      - id: matrix
        run: |
          SHA="${{ github.sha }}"
          MATRIX=$(jq -nc --arg sha "$SHA" '{include: [
            {name: "docker-linux-amd64", platform: "linux/amd64", runner: "ubuntu-22.04", target: "x86_64-unknown-linux-gnu", tag: ("tesseract-server:git-" + $sha + "-linux-amd64"), push: [("ghcr.io/hertzg/tesseract-server:git-" + $sha + "-linux-amd64"), ("hertzg/tesseract-server:git-" + $sha + "-linux-amd64")]},
            {name: "docker-linux-arm64-v8", platform: "linux/arm64/v8", runner: "ubuntu-22.04-arm", target: "aarch64-unknown-linux-gnu", tag: ("tesseract-server:git-" + $sha + "-linux-arm64-v8"), push: [("ghcr.io/hertzg/tesseract-server:git-" + $sha + "-linux-arm64-v8"), ("hertzg/tesseract-server:git-" + $sha + "-linux-arm64-v8")]}
          ]}')
          echo "builds=$MATRIX" >> "$GITHUB_OUTPUT"
      - uses: jwalton/gh-find-current-pr@v1
        if: ${{ github.event_name != 'pull_request' }}
        id: find-pr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ github.event_name == 'pull_request' || steps.find-pr.outputs.pr }}
        with:
          number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || steps.find-pr.outputs.pr }}
          message: |
            # 🐳 Docker Pipeline

            ⏳ In progress...

  docker-build:
    needs:
      - docker
      - compile
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key:
            ${{ runner.os }}-buildx-v2-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-v2-${{ matrix.platform }}
            ${{ runner.os }}-buildx-v2-
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: tesseract-server-${{ matrix.target }}
          path: ./compiled/
      - run: chmod +x ./compiled/tesseract-server
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: ${{ matrix.platform }}
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          tags: ${{ matrix.tag }}
          build-contexts: |
            builder=./compiled/
      - uses: ishworkh/container-image-artifact-upload@v2.0.0
        with:
          image: ${{ matrix.tag }}

  docker-test:
    needs:
      - docker
      - docker-build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: ishworkh/container-image-artifact-download@v2.1.0
        with:
          image: ${{ matrix.tag }}
      # Test that container is working
      - uses: e1himself/goss-installation-action@v1.3.0
        with:
          version: v0.4.9
      - uses: actions/checkout@v6
      - run: dgoss run ${{ matrix.tag }}

  docker-dive:
    needs:
      - docker
      - docker-build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: ishworkh/container-image-artifact-download@v2.1.0
        with:
          image: ${{ matrix.tag }}
      - name: Analyze image with dive
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            wagoodman/dive:v0.13 ${{ matrix.tag }} --ci

  docker-push:
    if:
      ${{ github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == 'hertzg/tesseract-server'
      }}
    needs:
      - test
      - docker
      - docker-test
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: ishworkh/container-image-artifact-download@v2.1.0
        with:
          image: ${{ matrix.tag }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - env:
          LOCAL_NAME: ${{ matrix.tag }}
          PUSH_NAMES: ${{ join(matrix.push, ' ') }}
        run: |
          for PUSH_NAME in $PUSH_NAMES; do
            docker tag "$LOCAL_NAME" "$PUSH_NAME"
            docker push "$PUSH_NAME"
          done;

  docker-multiarch:
    needs:
      - docker
      - docker-push
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/hertzg/tesseract-server
            hertzg/tesseract-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
      - env:
          DOCKER_CLI_EXPERIMENTAL: enabled
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          SHA="${{ github.sha }}"
          PLATFORMS=("linux-amd64" "linux-arm64-v8")

          echo "$META_TAGS" | while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            REPO="${TAG%%:*}"
            SOURCES=()
            for PLAT in "${PLATFORMS[@]}"; do
              SOURCES+=("${REPO}:git-${SHA}-${PLAT}")
            done
            echo "Creating manifest: $TAG"
            docker manifest create "$TAG" "${SOURCES[@]}"
            docker manifest push "$TAG"
          done

  pipeline-report:
    needs: [docker, compile, docker-build, docker-test, docker-dive, docker-push, docker-multiarch]
    if: ${{ always() && needs.docker.outputs.pr-number }}
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - name: Get artifact URLs
        id: artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          AMD64_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.artifacts[] | select(.name == "tesseract-server-x86_64-unknown-linux-gnu") | .id' 2>/dev/null || echo "")
          ARM64_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.artifacts[] | select(.name == "tesseract-server-aarch64-unknown-linux-gnu") | .id' 2>/dev/null || echo "")
          if [ -n "$AMD64_ID" ]; then
            echo "amd64-url=${RUN_URL}/artifacts/${AMD64_ID}" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$ARM64_ID" ]; then
            echo "arm64-url=${RUN_URL}/artifacts/${ARM64_ID}" >> "$GITHUB_OUTPUT"
          fi
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/hertzg/tesseract-server
            hertzg/tesseract-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
      - name: Build report
        env:
          COMPILE_RESULT: ${{ needs.compile.result }}
          BUILD_RESULT: ${{ needs.docker-build.result }}
          TEST_RESULT: ${{ needs.docker-test.result }}
          DIVE_RESULT: ${{ needs.docker-dive.result }}
          PUSH_RESULT: ${{ needs.docker-push.result }}
          MULTIARCH_RESULT: ${{ needs.docker-multiarch.result }}
          AMD64_URL: ${{ steps.artifacts.outputs.amd64-url }}
          ARM64_URL: ${{ steps.artifacts.outputs.arm64-url }}
          SHA: ${{ github.sha }}
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          status_icon() {
            case "$1" in
              success) echo "✅" ;;
              skipped) echo "⏭️" ;;
              *) echo "❌" ;;
            esac
          }

          {
            echo "# 🐳 Docker Pipeline"
            echo ""

            # Compile
            ICON=$(status_icon "$COMPILE_RESULT")
            if [ "$COMPILE_RESULT" = "success" ]; then
              echo "<details>"
              echo "<summary>🔨 Compile — ${ICON} ${COMPILE_RESULT}</summary>"
              echo ""
              echo "| Target | Artifact |"
              echo "|--------|----------|"
              if [ -n "${AMD64_URL:-}" ]; then
                echo "| \`x86_64-unknown-linux-gnu\` | [📦 download](${AMD64_URL}) |"
              else
                echo "| \`x86_64-unknown-linux-gnu\` | ⚠️ not available |"
              fi
              if [ -n "${ARM64_URL:-}" ]; then
                echo "| \`aarch64-unknown-linux-gnu\` | [📦 download](${ARM64_URL}) |"
              else
                echo "| \`aarch64-unknown-linux-gnu\` | ⚠️ not available |"
              fi
              echo ""
              echo "</details>"
            else
              echo "${ICON} **Compile** — ${COMPILE_RESULT}"
            fi

            echo ""

            # Build
            ICON=$(status_icon "$BUILD_RESULT")
            if [ "$BUILD_RESULT" = "success" ]; then
              echo "<details>"
              echo "<summary>🏗️ Build — ${ICON} ${BUILD_RESULT}</summary>"
              echo ""
              echo "| Platform | Image |"
              echo "|----------|-------|"
              echo "| \`linux/amd64\` | \`tesseract-server:git-${SHA}-linux-amd64\` |"
              echo "| \`linux/arm64/v8\` | \`tesseract-server:git-${SHA}-linux-arm64-v8\` |"
              echo ""
              echo "</details>"
            else
              echo "${ICON} **Build** — ${BUILD_RESULT}"
            fi

            echo ""

            # Test
            ICON=$(status_icon "$TEST_RESULT")
            echo "${ICON} **Test** — ${TEST_RESULT}"

            echo ""

            # Dive
            ICON=$(status_icon "$DIVE_RESULT")
            echo "${ICON} **Dive** — ${DIVE_RESULT}"

            echo ""

            # Push
            ICON=$(status_icon "$PUSH_RESULT")
            if [ "$PUSH_RESULT" = "success" ]; then
              echo "<details>"
              echo "<summary>📤 Push — ${ICON} ${PUSH_RESULT}</summary>"
              echo ""
              echo "| Registry | \`linux/amd64\` | \`linux/arm64/v8\` |"
              echo "|----------|---------------|------------------|"
              echo "| GHCR | \`ghcr.io/hertzg/tesseract-server:git-${SHA}-linux-amd64\` | \`ghcr.io/hertzg/tesseract-server:git-${SHA}-linux-arm64-v8\` |"
              echo "| Docker Hub | \`hertzg/tesseract-server:git-${SHA}-linux-amd64\` | \`hertzg/tesseract-server:git-${SHA}-linux-arm64-v8\` |"
              echo ""
              echo "</details>"
            else
              echo "${ICON} **Push** — ${PUSH_RESULT}"
            fi

            echo ""

            # Multi-arch
            ICON=$(status_icon "$MULTIARCH_RESULT")
            if [ "$MULTIARCH_RESULT" = "success" ] && [ -n "${META_TAGS:-}" ]; then
              echo "<details>"
              echo "<summary>🌐 Multi-arch — ${ICON} published</summary>"
              echo ""
              echo '```'
              echo "$META_TAGS"
              echo '```'
              echo ""
              echo "</details>"
            else
              echo "${ICON} **Multi-arch** — ${MULTIARCH_RESULT}"
            fi
          } > report.md
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ needs.docker.outputs.pr-number }}
          path: report.md
