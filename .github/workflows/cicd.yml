name: CICD
on:
  pull_request:
    branches:
      - master
  push:
    branches: []
    tags: "v*"
    paths:
      - "src/**/*"
      - "test/**/*"
      - ".github/action/**/*"
      - ".github/workflows/**/*"
      - "deno.json"
      - "deno.lock"
      - "Dockerfile"
      - ".dockerignore"
      - "goss*.yaml"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check src/index.ts
      - run: deno lint
      - run: deno fmt --check

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --allow-all

  compile:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            target: x86_64-unknown-linux-gnu
          - platform: linux/arm64/v8
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno compile --no-check --allow-net --allow-read --allow-write --allow-run --allow-env --allow-sys --target ${{ matrix.target }} --output tesseract-server src/index.ts
      - uses: actions/upload-artifact@v6
        with:
          name: tesseract-server-${{ matrix.target }}
          path: tesseract-server

  docker:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    outputs:
      config: ${{ steps.generate.outputs.config }}
      builds: ${{ steps.generate.outputs.builds }}
      manifests: ${{ steps.generate.outputs.manifests }}
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v6
      - id: generate
        uses: ./.github/actions/docker/buildConfig
        with:
          repositories: |
            ghcr.io/hertzg/tesseract-server
            hertzg/tesseract-server
          platforms: |
            linux/amd64
            linux/arm64/v8
      - uses: jwalton/gh-find-current-pr@v1
        if: ${{ github.event_name != 'pull_request' }}
        id: find-pr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ github.event_name != 'pull_request' }}
        with:
          number: ${{ steps.find-pr.outputs.pr }}
          message: |
            # Docker build request
            ```json
            ${{ toJSON(fromJSON(steps.generate.outputs.config)) }}
            ```

            Images are being built, please wait a few minutes before they get published. They will appear in this comment as soon as they are ready. You can follow the process by inspecting the running checks.

  docker-build:
    needs:
      - docker
      - compile
    runs-on: ${{ matrix.platform == 'linux/arm64/v8' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    permissions:
      packages: read
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if:
          ${{ github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name ==
          'hertzg/tesseract-server' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        if:
          ${{ github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name ==
          'hertzg/tesseract-server' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key:
            ${{ runner.os }}-buildx-v2-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-v2-${{ matrix.platform }}
            ${{ runner.os }}-buildx-v2-

      - uses: actions/checkout@v6
      - name: Map platform to deno target
        id: target
        run: |
          case "${{ matrix.platform }}" in
            linux/amd64) echo "name=x86_64-unknown-linux-gnu" >> $GITHUB_OUTPUT ;;
            linux/arm64/v8) echo "name=aarch64-unknown-linux-gnu" >> $GITHUB_OUTPUT ;;
          esac
      - uses: actions/download-artifact@v4
        with:
          name: tesseract-server-${{ steps.target.outputs.name }}
          path: ./compiled/
      - run: chmod +x ./compiled/tesseract-server
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: ${{ matrix.platform }}
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          tags: ${{ matrix.tag }}
          build-contexts: |
            builder=./compiled/
      - uses: ishworkh/container-image-artifact-upload@v2.0.0
        with:
          image: ${{ matrix.tag }}

  docker-test:
    needs:
      - docker
      - docker-build
    runs-on: ${{ matrix.platform == 'linux/arm64/v8' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: ishworkh/container-image-artifact-download@v2.1.0
        with:
          image: ${{ matrix.tag }}
      # Test that container is working
      - uses: e1himself/goss-installation-action@v1.3.0
        with:
          version: v0.4.9
      - uses: actions/checkout@v6
      - run: dgoss run ${{ matrix.tag }}

  docker-dive:
    needs:
      - docker
      - docker-build
    runs-on: ${{ matrix.platform == 'linux/arm64/v8' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: ishworkh/container-image-artifact-download@v2.1.0
        with:
          image: ${{ matrix.tag }}
      - name: Analyze image with dive
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            wagoodman/dive:v0.13 ${{ matrix.tag }} --ci

  docker-push:
    if:
      ${{ github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == 'hertzg/tesseract-server'
      }}
    needs:
      - test
      - docker
      - docker-test
    runs-on: ${{ matrix.platform == 'linux/arm64/v8' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    permissions:
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.builds) }}
      fail-fast: false
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: ishworkh/container-image-artifact-download@v2.1.0
        with:
          image: ${{ matrix.tag }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - env:
          LOCAL_NAME: ${{ matrix.tag }}
          PUSH_NAMES: ${{ join(matrix.push, ' ') }}
        run: |
          for PUSH_NAME in $PUSH_NAMES; do
            docker tag $LOCAL_NAME $PUSH_NAME
            docker push $PUSH_NAME
          done;

  docker-multiarch:
    needs:
      - docker
      - docker-push
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.docker.outputs.manifests) }}
      fail-fast: false
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          docker manifest create ${{ matrix.name }} ${{ join(matrix.images, ' ') }}
          docker manifest push ${{ matrix.name }}
      - uses: jwalton/gh-find-current-pr@v1
        if: ${{ github.event_name != 'pull_request' }}
        id: find-pr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ github.event_name != 'pull_request' }}
        with:
          number: ${{ steps.find-pr.outputs.pr }}
          append: true
          message: |
            ## Published `${{ matrix.name }}`
            ```json
            ${{ toJSON(matrix) }}
            ```
